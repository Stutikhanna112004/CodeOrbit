{% extends 'base.html' %}
{% block title %}Sign in — CodeOrbit{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;
            justify-content:center;padding-top:64px;">
  <div class="reveal" style="width:100%;max-width:360px;padding:0 24px;">

    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-size:32px;font-weight:300;color:#e0e0f0;
                  letter-spacing:-0.02em;margin-bottom:8px;">
        Sign in
      </div>
      <div style="font-size:13px;color:var(--muted);letter-spacing:0.04em;">
        CodeOrbit — AI code intelligence
      </div>
    </div>

    <div id="err" style="display:none;font-size:12px;color:#ef4444;
         text-align:center;margin-bottom:16px;letter-spacing:0.04em;"></div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <input id="username" type="text" placeholder="Username"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
      <input id="password" type="password" placeholder="Password"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
    </div>

    <button onclick="login()" class="btn-primary" id="btn"
      style="width:100%;padding:13px;font-size:12px;letter-spacing:0.1em;">
      Sign in
    </button>

    <div style="text-align:center;margin-top:20px;font-size:12px;
                color:var(--muted);letter-spacing:0.04em;">
      No account?
      <a href="/register/" style="color:var(--accent);text-decoration:none;">
        Create one
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (localStorage.getItem('access_token')) window.location.href = '/';

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    if (!username || !password) return;
    btn.textContent = '...'; btn.disabled = true;

    const res  = await fetch('/api/auth/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('err').textContent = 'Invalid credentials';
      document.getElementById('err').style.display = 'block';
      btn.textContent = 'Sign in'; btn.disabled = false;
      return;
    }

    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    localStorage.setItem('user', JSON.stringify({ username }));
    window.location.href = '/';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
{% endblock %}
