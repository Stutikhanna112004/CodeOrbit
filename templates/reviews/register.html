{% extends 'base.html' %}
{% block title %}Sign Up — CodeOrbit{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;
            justify-content:center;padding-top:64px;">
  <div class="reveal" style="width:100%;max-width:380px;padding:0 24px;">

    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-size:32px;font-weight:300;color:#e0e0f0;
                  letter-spacing:-0.02em;margin-bottom:8px;">
        Create account
      </div>
      <div style="font-size:13px;color:var(--muted);letter-spacing:0.04em;">
        CodeOrbit — AI code intelligence
      </div>
    </div>

    <div id="err" style="display:none;font-size:12px;color:#ef4444;
         text-align:center;margin-bottom:16px;letter-spacing:0.04em;
         padding:10px;background:#1a0a0a;border-radius:6px;
         border:1px solid #3a1a1a;"></div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <input id="username" type="text" placeholder="Username"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
      <input id="email" type="email" placeholder="Email"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
      <input id="password" type="password" placeholder="Password (min 8 chars)"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
      <input id="confirm" type="password" placeholder="Confirm password"
        style="padding:12px 14px;font-size:13px;width:100%;"/>
    </div>

    <button onclick="register()" class="btn-primary" id="btn"
      style="width:100%;padding:13px;font-size:12px;letter-spacing:0.1em;">
      Create account
    </button>

    <div style="text-align:center;margin-top:20px;font-size:12px;
                color:var(--muted);letter-spacing:0.04em;">
      Already have an account?
      <a href="/login/" style="color:var(--accent);text-decoration:none;">
        Sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (localStorage.getItem('access_token')) window.location.href = '/';

  async function register() {
    const username         = document.getElementById('username').value.trim();
    const email            = document.getElementById('email').value.trim();
    const password         = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm').value;
    const btn              = document.getElementById('btn');

    if (!username || !email || !password) {
      showErr('Please fill in all fields.'); return;
    }
    if (password !== confirm_password) {
      showErr('Passwords do not match.'); return;
    }

    btn.textContent = '...'; btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, confirm_password })
      });
      const data = await res.json();

      if (!res.ok) {
        const errors = Object.values(data).flat().join(' ');
        showErr(errors);
        btn.textContent = 'Create account';
        btn.disabled = false;
        return;
      }

      localStorage.setItem('access_token', data.tokens.access);
      localStorage.setItem('refresh_token', data.tokens.refresh);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/';

    } catch(e) {
      showErr('Network error — is the server running?');
      btn.textContent = 'Create account';
      btn.disabled = false;
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') register();
  });
</script>
{% endblock %}
